name: "Test AutoDoc Agent Swarm"
on:
  pull_request:
    types: [opened, edited, reopened]
    branches:
      - main

jobs:
  test-autodoc-swarm:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required for smart diffing to work

      - name: Run AutoDoc Swarm
        uses: ./
        with:
          github_token: ${{ secrets.PAT_TOKEN }}
          provider: 'openrouter'
          queen_model: 'stepfun/step-3.5-flash:free'
          worker_model: 'stepfun/step-3.5-flash:free'
          drone_model: 'stepfun/step-3.5-flash:free'
          api_key: ${{ secrets.OPENAI_API_KEY }}
          target_dir: './'
