name: "Test AutoDoc Agent Swarm"
on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test-autodoc-swarm:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required for smart diffing to work

      - name: Run AutoDoc Swarm
        uses: ./
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          provider: 'openai'
          queen_model: 'gpt-4o-mini'
          worker_model: 'gpt-4o-mini'
          drone_model: 'gpt-4o-mini'
          api_key: ${{ secrets.OPENAI_API_KEY }}
          target_dir: './dummy_repo'
